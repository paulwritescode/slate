name: Cost Gate

on:
  pull_request:
    paths:
      - "lib/**"
      - "bin/**"
      - "cdk/**"
      - "infra/**"

jobs:
  cost-estimate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: CDK Synth
        run: npx cdk synth
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Slate Cost Estimate
        id: estimate
        run: npx slate estimate --ci --json > cost-output.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Post cost report as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('.slate-report.json')) return;
            const report = JSON.parse(fs.readFileSync('.slate-report.json', 'utf8'));
            const tiers = Object.entries(report.tiers)
              .map(([k, v]) => `${k}: $${v.min} – $${v.max}/mo`)
              .join('\n');
            const status = report.budgetGate?.passed === false ? '❌ OVER BUDGET' : '✅ Within budget';
            const body = `## 💰 Slate Cost Estimate\n\n${status}\n\n\`\`\`\n${tiers}\n\`\`\`\n${report.drift?.summary ? `\n### Drift\n\`\`\`\n${report.drift.summary}\n\`\`\`` : ''}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload cost report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slate-cost-report
          path: .slate-report.json
